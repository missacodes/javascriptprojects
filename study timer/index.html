<!DOCTYPE html>
<html lang="en">
<head>
    <title>Study Timer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
<div class="timer">
<h1>Study Timer</h1>

<p id="display"></p>   <!-- the timer display -->
    <div class="button-group">
<button onclick = "startTimer(25)">25:00</button>
<button onclick = "startTimer(45)">45:00</button>
<button onclick = "startTimer(60)">60:00</button>
<button onclick = "startTimer(5)">5:00</button>
        </div>
    <div class="controls">
<button onclick = "pauseTimer()">Pause</button>
<button onclick = "resumeTimer()">Resume</button>
<button onclick = "resetTimer()">Reset</button>
    </div>
<p id="message"></p>
</div>
</body>
</html>
